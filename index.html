<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrepMate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>PrepMate</h1>
    <nav>
      <button onclick="toggleMenu()">☰ Menu</button>
      <div id="menu" class="menu-panel" style="display:none;">
        <button onclick="goHome()">🏠 Home</button>
      </div>
    </nav>
  </header>

  <!-- Screen 1: Subject Selection -->
  <main id="subject-selection">
    <h2>Select Subject</h2>
    <button onclick="selectSubject('Maths')">Maths</button>
    <button onclick="selectSubject('Science')">Science</button>
  </main>
  
  <!-- Screen 2: Chapter Selection -->
  <section id="chapter-selection" style="display:none;">
    <h2>Select Chapter</h2>
    <select id="chapterDropdown" onchange="fetchChapterInfo()">
      <option value="">-- Choose a Chapter --</option>
    </select>
    <br><br>
    <div id="chapterInfo" class="content-box"></div>
    <button onclick="goHome()">⬅ Back to Subjects</button>
  </section>

  <!-- Screen 3: Chapter Details -->
  <section id="chapter-details" style="display:none;">
    <h2 id="chapterTitle"></h2>
    <div id="chapterContent" class="content-box" aria-live="polite"></div>
    <button onclick="backToChapters()">⬅ Back to Chapters</button>
  </section>
  
  <!-- Footer -->
  <footer>
    <p>PrepMate v1.0 (MVP)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
