<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMate - CBSE 10th</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .prose h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; color: #1e40af; border-left: 4px solid #2563eb; padding-left: 10px; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .answer-box { transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white px-2 py-1 rounded font-bold">PM</div>
            <span class="text-xl font-bold text-blue-900 tracking-tight">PrepMate</span>
        </div>
        <button onclick="resetApp()" class="text-[10px] font-black text-gray-400 border px-2 py-1 rounded">Reset</button>
    </header>

    <main class="max-w-3xl mx-auto p-4 pb-24">
        <div id="setup-screen" class="bg-white p-8 rounded-3xl shadow-xl mt-10 border border-blue-50">
            <h2 class="text-2xl font-bold mb-4 text-blue-900">Welcome 🚀</h2>
            <input type="password" id="api-key-input" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-4 focus:border-blue-500 outline-none" placeholder="Paste Gemini API key here">
            <button onclick="saveKey()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Launch</button>
        </div>

        <div id="subject-screen" class="hidden text-center py-10">
            <h2 class="text-2xl font-black mb-8 text-gray-800 uppercase">Select Subject</h2>
            <div class="grid grid-cols-2 gap-6">
                <button onclick="selectSubject('Maths')" class="p-10 bg-white border-2 border-transparent hover:border-blue-500 rounded-3xl shadow-sm transition-all group">
                    <span class="text-5xl block mb-4 group-hover:scale-110 transition">🔢</span>
                    <span class="font-bold text-lg">Maths</span>
                </button>
                <button onclick="selectSubject('Science')" class="p-10 bg-white border-2 border-transparent hover:border-blue-500 rounded-3xl shadow-sm transition-all group">
                    <span class="text-5xl block mb-4 group-hover:scale-110 transition">🧪</span>
                    <span class="font-bold text-lg">Science</span>
                </button>
            </div>
        </div>

        <div id="chapter-screen" class="hidden">
            <button onclick="showScreen('subject-screen')" class="text-blue-600 mb-4 text-sm font-bold flex items-center">← Subjects</button>
            <h2 id="sub-heading" class="text-2xl font-bold mb-6 text-blue-900">Chapters</h2>
            <div id="chap-loading" class="hidden py-4 text-blue-500 italic animate-pulse">Syncing Syllabus...</div>
            <select id="chapter-dropdown" class="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl mb-8 shadow-sm outline-none"></select>
            <button onclick="initMode()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg">Get Started</button>
        </div>

        <div id="study-screen" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <button onclick="showScreen('chapter-screen')" class="text-blue-600 text-sm font-bold">← Back</button>
                <span id="current-info" class="text-[10px] font-black text-gray-400 uppercase tracking-widest"></span>
            </div>
            
            <nav class="flex border-b border-gray-100 mb-6 overflow-x-auto no-scrollbar">
                <button onclick="switchTab('notes')" id="tab-notes" class="px-6 py-3 text-gray-400 whitespace-nowrap font-bold">Notes</button>
                <button onclick="switchTab('exercise')" id="tab-exercise" class="px-6 py-3 text-gray-400 whitespace-nowrap font-bold">Exercise</button>
                <button onclick="switchTab('revision')" id="tab-revision" class="px-6 py-3 text-gray-400 whitespace-nowrap font-bold">Revision</button>
                <button onclick="switchTab('test')" id="tab-test" class="px-6 py-3 text-gray-400 whitespace-nowrap font-bold">Unit Test</button>
            </nav>

            <div id="subsection-area" class="mb-6 p-4 bg-blue-50 rounded-2xl border border-blue-100 hidden">
                <label class="text-[10px] font-black text-blue-400 uppercase mb-2 block tracking-widest">Select Sub-Topic</label>
                <select id="subsection-dropdown" onchange="loadActiveContent()" class="w-full bg-transparent text-blue-900 font-bold outline-none cursor-pointer text-lg"></select>
            </div>

            <div id="content-display" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-50 min-h-[450px]">
                <div id="loader" class="hidden flex flex-col items-center justify-center py-24 text-center">
                    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-gray-400 font-medium italic">Gemini 3.1 Flash Lite is working...</p>
                </div>
                <div id="response-area" class="prose max-w-none text-gray-700 leading-relaxed"></div>
            </div>
        </div>
    </main>

    <script>
        let state = {
            key: localStorage.getItem('pm_key'),
            subject: '',
            chapter: '',
            activeTab: 'notes'
        };

        const MODEL = "gemini-3.1-flash-lite-preview";

        function showScreen(id) {
            ['setup-screen', 'subject-screen', 'chapter-screen', 'study-screen'].forEach(s => 
                document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function saveKey() {
            const val = document.getElementById('api-key-input').value;
            if(val) { localStorage.setItem('pm_key', val); state.key = val; showScreen('subject-screen'); }
        }

        async function callGemini(prompt, cacheKeySuffix) {
            const cacheKey = `cache_${state.subject}_${state.chapter}_${cacheKeySuffix}`.replace(/\s+/g, '_').toLowerCase();
            const cached = localStorage.getItem(cacheKey);
            if(cached) return cached;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${state.key}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                localStorage.setItem(cacheKey, text); 
                return text;
            } catch (e) { return `Error: ${e.message}`; }
        }

        async function selectSubject(s) {
            state.subject = s;
            document.getElementById('sub-heading').innerText = s + " Chapters";
            showScreen('chapter-screen');
            const drop = document.getElementById('chapter-dropdown');
            const load = document.getElementById('chap-loading');
            drop.classList.add('hidden'); load.classList.remove('hidden');
            const res = await callGemini(`List names of all CBSE Class 10 ${s} chapters.`, 'list');
            const chapters = res.split('\n').map(l => l.trim()).filter(l => l.length > 3)
                .map(l => l.replace(/^[\d\.\-\s*]+/, '').replace(/\*\*/g, '').trim());
            drop.innerHTML = chapters.map(c => `<option value="${c}">${c}</option>`).join('');
            load.classList.add('hidden'); drop.classList.remove('hidden');
        }

        async function initMode() {
            state.chapter = document.getElementById('chapter-dropdown').value;
            document.getElementById('current-info').innerText = `${state.subject} • ${state.chapter}`;
            showScreen('study-screen');
            const subDrop = document.getElementById('subsection-dropdown');
            subDrop.innerHTML = `<option>Loading Topics...</option>`;
            const res = await callGemini(`List 5 topics for CBSE 10th ${state.subject}: ${state.chapter}.`, 'subtopics');
            const topics = res.split('\n').map(l => l.trim()).filter(l => l.length > 2)
                .map(l => l.replace(/^[\d\.\-\s*]+/, '').replace(/\*\*/g, '').trim());
            subDrop.innerHTML = topics.map(t => `<option value="${t}">${t}</option>`).join('');
            switchTab('notes');
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tab).classList.add('active-tab');
            document.getElementById('subsection-area').classList.toggle('hidden', tab !== 'notes');
            loadActiveContent();
        }

        function toggleAnswer(id) {
            const el = document.getElementById('ans-' + id);
            el.classList.toggle('hidden');
        }

        async function loadActiveContent() {
            const area = document.getElementById('response-area');
            const loader = document.getElementById('loader');
            const topic = document.getElementById('subsection-dropdown').value;
            area.innerHTML = ""; loader.classList.remove('hidden');

            let prompt = "";
            let cacheSuffix = state.activeTab;

            if (state.activeTab === 'notes') {
                prompt = `Explain CBSE 10th ${state.subject} topic: "${topic}". Rules: Start directly with ##, no intro sentences like "This guide covers", no rules, no horizontal rules (---), no bold symbols **.`;
                cacheSuffix = `topic_${topic}`;
            } else if (state.activeTab === 'exercise') {
                prompt = `Provide 5 practice questions for CBSE 10th ${state.subject} chapter ${state.chapter}. 
                Format: 
                Q1: Question text
                A1: Detailed solution
                ...repeat...
                Strictly no intro, no asterisks, no --- lines.`;
            } else {
                prompt = `Provide ${state.activeTab} for ${state.subject}: ${state.chapter}. Start content immediately. No intros.`;
            }

            let md = await callGemini(prompt, cacheSuffix);
            
            // Clean Logic
            let lines = md.split('\n').map(l => l.trim()).filter(l => !l.startsWith('---') && l.length > 0);
            if (lines.length > 0 && /^(this guide|certainly|here is|the following|welcome|covers)/i.test(lines[0])) lines.shift();

            let finalHtml = "";

            if (state.activeTab === 'exercise') {
                // Parse Questions and Answers
                let content = lines.join('\n').replace(/\*\*/g, '');
                const qaPairs = content.split(/Q\d+:/g).filter(s => s.trim().length > 0);
                
                finalHtml = qaPairs.map((pair, index) => {
                    const [q, a] = pair.split(/A\d+:/);
                    return `
                        <div class="mb-8 p-4 bg-white border border-gray-100 rounded-2xl shadow-sm">
                            <p class="font-bold text-blue-900 mb-3">Question ${index + 1}: ${q.trim()}</p>
                            <button onclick="toggleAnswer(${index})" class="text-xs bg-gray-100 px-3 py-1 rounded-full font-bold text-gray-500 hover:bg-blue-600 hover:text-white transition">View Answer</button>
                            <div id="ans-${index}" class="hidden mt-4 p-4 bg-green-50 rounded-xl text-green-800 text-sm border-l-4 border-green-400">
                                <b>Answer:</b><br>${a ? a.trim() : "Answer not found."}
                            </div>
                        </div>`;
                }).join('');
            } else {
                finalHtml = lines.join('\n')
                    .replace(/\*\*/g, '')
                    .replace(/^## (.*$)/gim, '<h2 class="text-blue-800 font-bold">$1</h2>')
                    .replace(/^\* (.*$)/gim, '<li class="ml-4 mb-2">$1</li>')
                    .replace(/\n/g, '<br>');
            }

            area.innerHTML = finalHtml;
            loader.classList.add('hidden');
        }

        function resetApp() { if(confirm("Reset?")) { localStorage.clear(); location.reload(); } }
        if(state.key) showScreen('subject-screen');
    </script>
</body>
</html>
