<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMate - CBSE 10th</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .prose h2 { font-size: 1.3rem; font-weight: bold; margin-top: 1.5rem; color: #1e3a8a; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white px-2 py-1 rounded font-bold">PM</div>
            <span class="text-xl font-bold text-blue-900">PrepMate</span>
        </div>
        <button onclick="resetApp()" class="text-xs text-red-400 font-bold uppercase tracking-widest">Reset</button>
    </header>

    <main class="max-w-3xl mx-auto p-4 pb-24">
        
        <div id="setup-screen" class="bg-white p-8 rounded-3xl shadow-xl mt-10 border border-blue-50">
            <h2 class="text-2xl font-bold mb-4 text-blue-900">Connect Gemini API</h2>
            <p class="text-sm text-gray-500 mb-6">Enter your API key to enable dynamic CBSE 10th content. Key is saved locally.</p>
            <input type="password" id="api-key-input" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-4 focus:border-blue-500 outline-none" placeholder="AIzaSy...">
            <button onclick="saveKey()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">Launch PrepMate</button>
        </div>

        <div id="subject-screen" class="hidden text-center py-10">
            <h2 class="text-2xl font-black mb-8 text-gray-800 uppercase tracking-tight">Select Subject</h2>
            <div class="grid grid-cols-2 gap-6">
                <button onclick="selectSubject('Maths')" class="p-10 bg-white border-2 border-transparent hover:border-blue-500 rounded-3xl shadow-sm transition-all group">
                    <span class="text-5xl block mb-4 group-hover:scale-110 transition">🔢</span>
                    <span class="font-bold text-lg">Maths</span>
                </button>
                <button onclick="selectSubject('Science')" class="p-10 bg-white border-2 border-transparent hover:border-blue-500 rounded-3xl shadow-sm transition-all group">
                    <span class="text-5xl block mb-4 group-hover:scale-110 transition">🧪</span>
                    <span class="font-bold text-lg">Science</span>
                </button>
            </div>
        </div>

        <div id="chapter-screen" class="hidden">
            <button onclick="showScreen('subject-screen')" class="text-blue-600 mb-4 text-sm font-bold flex items-center">← Subjects</button>
            <h2 id="sub-heading" class="text-2xl font-bold mb-6"></h2>
            <div id="chap-loading" class="hidden animate-pulse py-4 text-blue-500 italic">Fetching CBSE Chapters...</div>
            <select id="chapter-dropdown" class="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl mb-8 shadow-sm outline-none"></select>
            <div class="flex gap-4">
                <button onclick="initMode('Study')" class="flex-1 bg-green-500 text-white py-4 rounded-2xl font-bold text-lg shadow-md">Study Mode</button>
                <button onclick="initMode('Test')" class="flex-1 bg-orange-500 text-white py-4 rounded-2xl font-bold text-lg shadow-md">Test Mode</button>
            </div>
        </div>

        <div id="study-screen" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <button onclick="showScreen('chapter-screen')" class="text-blue-600 text-sm font-bold">← Back</button>
                <span id="current-info" class="text-xs font-bold text-gray-400 uppercase"></span>
            </div>
            
            <nav class="flex border-b border-gray-100 mb-6 overflow-x-auto no-scrollbar">
                <button onclick="loadContent('notes')" id="tab-notes" class="px-6 py-2 text-gray-400 whitespace-nowrap font-bold">Notes</button>
                <button onclick="loadContent('exercise')" id="tab-exercise" class="px-6 py-2 text-gray-400 whitespace-nowrap font-bold">Exercise</button>
                <button onclick="loadContent('revision')" id="tab-revision" class="px-6 py-2 text-gray-400 whitespace-nowrap font-bold">Revision</button>
                <button onclick="loadContent('unit-test')" id="tab-unit-test" class="px-6 py-2 text-gray-400 whitespace-nowrap font-bold">Unit Test</button>
            </nav>

            <div id="content-display" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-50 min-h-[400px]">
                <div id="loader" class="hidden flex flex-col items-center justify-center py-20">
                    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-gray-400 font-medium italic">Gemini is thinking...</p>
                </div>
                <div id="response-area" class="prose max-w-none text-gray-700"></div>
            </div>
        </div>
    </main>

    <script>
        let state = {
            key: localStorage.getItem('pm_key'),
            subject: '',
            chapter: ''
        };

        // UI Helpers
        function showScreen(id) {
            ['setup-screen', 'subject-screen', 'chapter-screen', 'study-screen'].forEach(s => 
                document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function saveKey() {
            const val = document.getElementById('api-key-input').value;
            if(val) { localStorage.setItem('pm_key', val); state.key = val; showScreen('subject-screen'); }
        }

        // FIXED API Engine with Local Storage Caching
        async function callGemini(prompt, tabName) {
            const cacheKey = `cache_${state.subject}_${state.chapter}_${tabName}`.replace(/\s+/g, '_').toLowerCase();
            const cached = localStorage.getItem(cacheKey);
            if(cached) return cached;

            try {
                // UPDATE: Using the stable 2026 model gemini-2.0-flash
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.key}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                localStorage.setItem(cacheKey, text); // Save to cache
                return text;
            } catch (e) {
                return `Content not available, please try again.`;
            }
        }

        async function selectSubject(s) {
            state.subject = s;
            document.getElementById('sub-heading').innerText = s + " Chapters";
            showScreen('chapter-screen');
            
            const drop = document.getElementById('chapter-dropdown');
            const load = document.getElementById('chap-loading');
            drop.classList.add('hidden');
            load.classList.remove('hidden');

            const res = await callGemini(`List all chapters in CBSE Class 10 ${s} curriculum. List names only.`, 'list');
            const chapters = res.split('\n').filter(l => l.trim().length > 3);
            drop.innerHTML = chapters.map(c => `<option value="${c.replace(/^\d+\.\s*/, '')}">${c}</option>`).join('');
            
            load.classList.add('hidden');
            drop.classList.remove('hidden');
        }

        function initMode(m) {
            state.chapter = document.getElementById('chapter-dropdown').value;
            document.getElementById('current-info').innerText = `${state.subject} • ${state.chapter}`;
            showScreen('study-screen');
            loadContent('notes');
        }

        async function loadContent(tab) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tab).classList.add('active-tab');

            const area = document.getElementById('response-area');
            const loader = document.getElementById('loader');
            area.innerHTML = "";
            loader.classList.remove('hidden');

            const prompts = {
                notes: `Generate detailed CBSE Class 10 ${state.subject} notes for ${state.chapter}. Use headings (##) and bullets.`,
                exercise: `Generate 5 practice questions for CBSE Class 10 ${state.subject}, Chapter: ${state.chapter}.`,
                revision: `Generate a 10-point revision summary for ${state.subject}: ${state.chapter}.`,
                'unit-test': `Generate a unit test for ${state.chapter} for CBSE 10th ${state.subject}.`
            };

            let md = await callGemini(prompts[tab], tab);
            
            // Format Markdown for rendering
            area.innerHTML = md
                .replace(/^## (.*$)/gim, '<h2 class="text-blue-800">$1</h2>')
                .replace(/^\* (.*$)/gim, '<li class="ml-4">$1</li>')
                .replace(/\n/g, '<br>');

            loader.classList.add('hidden');
        }

        function resetApp() { localStorage.clear(); location.reload(); }
        if(state.key) showScreen('subject-screen');
    </script>
</body>
</html>
