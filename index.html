<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrepMate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>PrepMate</h1>
    <nav>
      <button onclick="alert('Menu coming soon!')">☰ Menu</button>
    </nav>
  </header>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-button active" onclick="showTab('notes')">Notes</button>
    <button class="tab-button" onclick="showTab('exercise')">Exercise</button>
    <button class="tab-button" onclick="showTab('revision')">Revision</button>
  </div>

  <!-- Notes Tab -->
  <section id="notes" class="tab-content">
    <h2>Notes</h2>
    <select id="subsectionDropdown">
      <option value="">-- Choose a Subsection --</option>
    </select>
    <br><br>
    <button onclick="loadNotes()">Load Notes</button>
    <button onclick="moreExplanation()">More Explanation</button>
    <button onclick="watchVideo()">Watch Video</button>
    <div id="notesContent" class="content-box"></div>
  </section>

  <!-- Exercise Tab -->
  <section id="exercise" class="tab-content" style="display:none;">
    <h2>Exercise</h2>
    <select id="exerciseDropdown">
      <option value="">-- Choose an Exercise --</option>
    </select>
    <br><br>
    <button onclick="loadExerciseQuestions()">Load Questions</button>
    <div id="exerciseContent" class="content-box"></div>
  </section>

  <!-- Revision Tab -->
  <section id="revision" class="tab-content" style="display:none;">
    <h2>Revision</h2>
    <p>Quick revision notes will appear here.</p>
  </section>

  <footer>
    <p>PrepMate v1.0 (MVP)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
