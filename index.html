<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMate - CBSE 10th Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .prose h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; color: #1e40af; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white px-2 py-1 rounded font-bold">PM</div>
            <span class="text-xl font-bold text-blue-900">PrepMate</span>
        </div>
        <button onclick="resetApp()" class="text-xs text-red-400 hover:text-red-600">Reset Setup</button>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        
        <div id="setup-screen" class="bg-white p-8 rounded-2xl shadow-xl mt-10">
            <h2 class="text-2xl font-bold mb-4">Gemini API Setup</h2>
            <p class="text-sm text-gray-500 mb-6">Enter your API key from Google AI Studio. This allows direct browser-to-AI communication.</p>
            <input type="password" id="api-key-input" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 ring-blue-500" placeholder="Paste AIza... key here">
            <button onclick="saveKey()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Connect PrepMate</button>
        </div>

        <div id="subject-screen" class="hidden text-center py-10">
            <h2 class="text-2xl font-bold mb-8">Select Subject</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectSubject('Maths')" class="p-8 bg-white border rounded-2xl shadow hover:shadow-lg transition-all">
                    <span class="text-4xl block mb-2">🔢</span><span class="font-bold">Maths</span>
                </button>
                <button onclick="selectSubject('Science')" class="p-8 bg-white border rounded-2xl shadow hover:shadow-lg transition-all">
                    <span class="text-4xl block mb-2">🧪</span><span class="font-bold">Science</span>
                </button>
            </div>
        </div>

        <div id="chapter-screen" class="hidden">
            <button onclick="showScreen('subject-screen')" class="text-blue-600 mb-4 text-sm font-bold">← Subjects</button>
            <h2 id="sub-heading" class="text-2xl font-bold mb-4"></h2>
            <div id="chap-loading" class="hidden animate-pulse py-4 text-blue-500 italic">Fetching CBSE Syllabus...</div>
            <select id="chapter-dropdown" class="w-full p-4 bg-white border rounded-xl mb-6"></select>
            <div class="flex gap-4">
                <button onclick="initMode('Study')" class="flex-1 bg-green-500 text-white py-4 rounded-xl font-bold">Study Mode</button>
                <button onclick="initMode('Test')" class="flex-1 bg-orange-500 text-white py-4 rounded-xl font-bold">Test Mode</button>
            </div>
        </div>

        <div id="study-screen" class="hidden">
            <button onclick="showScreen('chapter-screen')" class="text-blue-600 mb-4 text-sm font-bold">← Chapters</button>
            <h3 id="current-chapter" class="text-lg font-bold text-blue-900 mb-4 italic"></h3>
            
            <nav class="flex border-b mb-6 overflow-x-auto">
                <button onclick="loadContent('notes')" id="tab-notes" class="px-4 py-2 text-gray-400">Notes</button>
                <button onclick="loadContent('exercise')" id="tab-exercise" class="px-4 py-2 text-gray-400">Exercise</button>
                <button onclick="loadContent('revision')" id="tab-revision" class="px-4 py-2 text-gray-400">Revision</button>
                <button onclick="loadContent('unit-test')" id="tab-unit-test" class="px-4 py-2 text-gray-400">Unit Test</button>
            </nav>

            <div id="content-area" class="bg-white p-6 rounded-xl shadow-inner min-h-[400px]">
                <div id="loader" class="hidden flex flex-col items-center justify-center py-20">
                    <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-gray-400">Generating content...</p>
                </div>
                <div id="response-text" class="prose max-w-none"></div>
            </div>
        </div>
    </main>

    <script>
        let config = {
            key: localStorage.getItem('pm_key'),
            subject: '',
            chapter: ''
        };

        function showScreen(id) {
            ['setup-screen', 'subject-screen', 'chapter-screen', 'study-screen'].forEach(s => 
                document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function saveKey() {
            const k = document.getElementById('api-key-input').value;
            if(k) { localStorage.setItem('pm_key', k); config.key = k; showScreen('subject-screen'); }
        }

        // FIXED API CALL FUNCTION
        async function callGemini(prompt) {
            try {
                // The URL structure is critical: v1beta/models/model-name:generateContent
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${config.key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "API request failed");
                }

                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return `<p class="text-red-500 font-bold">Error: ${e.message}</p>`;
            }
        }

        async function selectSubject(s) {
            config.subject = s;
            document.getElementById('sub-heading').innerText = s + " Chapters";
            showScreen('chapter-screen');
            
            const drop = document.getElementById('chapter-dropdown');
            const load = document.getElementById('chap-loading');
            drop.classList.add('hidden');
            load.classList.remove('hidden');

            const res = await callGemini(`List all chapters in CBSE Class 10 ${s} curriculum. Provide the output as a simple list of chapter names only.`);
            const list = res.split('\n').filter(l => l.trim().length > 2);
            drop.innerHTML = list.map(c => `<option value="${c.replace(/^\d+\.\s*/, '')}">${c}</option>`).join('');
            
            load.classList.add('hidden');
            drop.classList.remove('hidden');
        }

        function initMode(m) {
            config.chapter = document.getElementById('chapter-dropdown').value;
            document.getElementById('current-chapter').innerText = `${config.subject}: ${config.chapter}`;
            showScreen('study-screen');
            loadContent('notes');
        }

        async function loadContent(tab) {
            document.querySelectorAll('nav button').forEach(b => b.className = "px-4 py-2 text-gray-400");
            document.getElementById('tab-' + tab).className = "px-4 py-2 active-tab";

            const area = document.getElementById('response-text');
            const load = document.getElementById('loader');
            area.innerHTML = "";
            load.classList.remove('hidden');

            const prompts = {
                notes: `Generate detailed CBSE 10th ${config.subject} notes for ${config.chapter}. Use markdown headers (##) and bullets.`,
                exercise: `Generate 5 practice questions for CBSE 10th ${config.subject} chapter ${config.chapter}.`,
                revision: `Generate a 10-point quick revision summary for ${config.subject}: ${config.chapter}.`,
                'unit-test': `Generate a 15-mark unit test for CBSE 10th ${config.subject} chapter ${config.chapter}.`
            };

            let md = await callGemini(prompts[tab]);
            
            // Simple Markdown formatter for the browser
            area.innerHTML = md
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                .replace(/\n/g, '<br>');

            load.classList.add('hidden');
        }

        function resetApp() { localStorage.clear(); location.reload(); }
        if(config.key) showScreen('subject-screen');
    </script>
</body>
</html>
